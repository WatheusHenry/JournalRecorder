<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="stampMask">
      <!-- fundo visível -->
      <rect width="100" height="100" fill="white"/>

      <!-- furos topo -->
      <circle cx="5" cy="0" r="3" fill="black"/>
      <circle cx="15" cy="0" r="3" fill="black"/>
      <circle cx="25" cy="0" r="3" fill="black"/>
      <circle cx="35" cy="0" r="3" fill="black"/>
      <circle cx="45" cy="0" r="3" fill="black"/>
      <circle cx="55" cy="0" r="3" fill="black"/>
      <circle cx="65" cy="0" r="3" fill="black"/>
      <circle cx="75" cy="0" r="3" fill="black"/>
      <circle cx="85" cy="0" r="3" fill="black"/>
      <circle cx="95" cy="0" r="3" fill="black"/>

      <!-- furos baixo -->
      <circle cx="5" cy="100" r="3" fill="black"/>
      <circle cx="15" cy="100" r="3" fill="black"/>
      <circle cx="25" cy="100" r="3" fill="black"/>
      <circle cx="35" cy="100" r="3" fill="black"/>
      <circle cx="45" cy="100" r="3" fill="black"/>
      <circle cx="55" cy="100" r="3" fill="black"/>
      <circle cx="65" cy="100" r="3" fill="black"/>
      <circle cx="75" cy="100" r="3" fill="black"/>
      <circle cx="85" cy="100" r="3" fill="black"/>
      <circle cx="95" cy="100" r="3" fill="black"/>

      <!-- furos esquerda -->
      <circle cx="0" cy="5" r="3" fill="black"/>
      <circle cx="0" cy="15" r="3" fill="black"/>
      <circle cx="0" cy="25" r="3" fill="black"/>
      <circle cx="0" cy="35" r="3" fill="black"/>
      <circle cx="0" cy="45" r="3" fill="black"/>
      <circle cx="0" cy="55" r="3" fill="black"/>
      <circle cx="0" cy="65" r="3" fill="black"/>
      <circle cx="0" cy="75" r="3" fill="black"/>
      <circle cx="0" cy="85" r="3" fill="black"/>
      <circle cx="0" cy="95" r="3" fill="black"/>

      <!-- furos direita -->
      <circle cx="100" cy="5" r="3" fill="black"/>
      <circle cx="100" cy="15" r="3" fill="black"/>
      <circle cx="100" cy="25" r="3" fill="black"/>
      <circle cx="100" cy="35" r="3" fill="black"/>
      <circle cx="100" cy="45" r="3" fill="black"/>
      <circle cx="100" cy="55" r="3" fill="black"/>
      <circle cx="100" cy="65" r="3" fill="black"/>
      <circle cx="100" cy="75" r="3" fill="black"/>
      <circle cx="100" cy="85" r="3" fill="black"/>
      <circle cx="100" cy="95" r="3" fill="black"/>
    </mask>
  </defs>

  <!-- Retângulo com a máscara aplicada -->
  <rect width="100" height="100" fill="white" mask="url(#stampMask)"/>
</svg>